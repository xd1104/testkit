<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>自動化測試工具</title>
<style>
  :root {
    --bg: #0f1115; --card: #181b22; --line: #272b34; --txt: #e6e8ec;
    --muted: #9aa3b2; --accent: #4f8cff; --ok: #2ecc71; --fail: #ff5c5c;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--txt);
    font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif; }
  .wrap { max-width: 880px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .card { background: var(--card); border: 1px solid var(--line);
    border-radius: 12px; padding: 20px; margin-bottom: 18px; }
  label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 6px; }
  input, select { width: 100%; padding: 10px 12px; background: #0f1115;
    border: 1px solid var(--line); border-radius: 8px; color: var(--txt); font-size: 14px; }
  button { margin-top: 18px; width: 100%; padding: 12px; background: var(--accent);
    color: #fff; border: 0; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .progress { display: none; }
  .bar { height: 8px; background: #0f1115; border-radius: 6px; overflow: hidden; margin: 10px 0; }
  .bar > i { display: block; height: 100%; width: 0; background: var(--accent); transition: width .2s; }
  .bar > i.indet { background: linear-gradient(90deg, transparent, var(--accent), transparent);
    background-size: 40% 100%; background-repeat: no-repeat; animation: indet 1.2s infinite linear; }
  @keyframes indet { 0% { background-position: -40% 0; } 100% { background-position: 140% 0; } }
  .pmsg { font-size: 13px; color: var(--muted); }
  .verdict { font-size: 26px; font-weight: 800; }
  .verdict.PASS { color: var(--ok); } .verdict.FAIL { color: var(--fail); }
  .meta { color: var(--muted); font-size: 13px; margin: 4px 0 16px; }
  .stat { display: inline-block; background: #0f1115; border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 12px; margin: 0 8px 8px 0; font-size: 13px; }
  .dlbar { margin: 14px 0 4px; display: flex; gap: 8px; flex-wrap: wrap; }
  .dl { width: auto; margin: 0; padding: 8px 14px; font-size: 13px; font-weight: 600;
    background: #0f1115; color: var(--txt); border: 1px solid var(--line); }
  .dl:hover { border-color: var(--accent); color: var(--accent); }
  .diff { border: 1px solid var(--line); border-radius: 8px; margin-top: 12px; overflow: hidden; }
  .diff > h4 { margin: 0; padding: 10px 14px; background: #0f1115; font-size: 14px;
    border-bottom: 1px solid var(--line); }
  .row { padding: 6px 14px; font-size: 13px; border-bottom: 1px solid var(--line); }
  .row:last-child { border-bottom: 0; }
  .tag { font-size: 11px; padding: 1px 6px; border-radius: 4px; margin-right: 6px; }
  .tag.miss { background: #3a1a1a; color: var(--fail); }
  .tag.extra { background: #1a2e3a; color: var(--accent); }
  .tag.icon { background: #3a3119; color: #e6b34f; }
  .tag.ok { background: #14361f; color: var(--ok); }
  .testdesc:not(:empty) { margin: 10px 0 4px; padding: 10px 12px; background: #0f1115;
    border: 1px solid var(--line); border-radius: 8px; color: var(--muted);
    font-size: 13px; line-height: 1.5; }
  .iconpath { color: var(--muted); font-size: 11px; margin-top: 4px;
    word-break: break-all; font-family: monospace; }
  .runs a { color: var(--accent); text-decoration: none; }
  .runrow { display: flex; justify-content: space-between; font-size: 13px;
    padding: 8px 0; border-bottom: 1px solid var(--line); }
  .pill { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
  .pill.PASS { background: #14361f; color: var(--ok); }
  .pill.FAIL { background: #3a1414; color: var(--fail); }
  .err { color: var(--fail); font-size: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>自動化測試工具</h1>
  <div class="sub">選測試項目 → 填網址 → 按開始，跑完顯示報告</div>

  <div class="card">
    <label>測試項目</label>
    <select id="testId"></select>
    <div id="testDesc" class="testdesc"></div>
    <div id="inputs"></div>
    <button id="go">開始測試</button>
  </div>

  <div class="card progress" id="progress">
    <div class="pmsg" id="pmsg">準備中…</div>
    <div class="bar"><i id="barfill"></i></div>
    <div class="pmsg" id="psub"></div>
  </div>

  <div id="reportBox"></div>

  <div class="card runs">
    <label style="margin-top:0">歷史紀錄</label>
    <div id="runs"></div>
  </div>
</div>

<script>
const $ = (s) => document.querySelector(s);
let TESTS = [];

async function loadTests() {
  TESTS = await (await fetch("/api/tests")).json();
  const sel = $("#testId");
  sel.innerHTML = TESTS.map((t) => `<option value="${t.id}">${t.name}</option>`).join("");
  renderInputs();
  sel.onchange = renderInputs;
}
function curTest() { return TESTS.find((t) => t.id === $("#testId").value); }
function renderInputs() {
  const t = curTest();
  $("#testDesc").innerHTML = t.description ? `📋 ${esc(t.description)}` : "";
  $("#inputs").innerHTML = t.inputs.map((i) =>
    `<label>${i.label}</label><input id="in_${i.key}" placeholder="${i.placeholder || ""}" />`
  ).join("");
  // B 類顯示「產生指令」，A 類顯示「開始測試」
  $("#go").textContent = t.mode === "prompt" ? "產生指令" : "開始測試";
}

function esc(s) { return String(s == null ? "" : s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }

async function loadRuns() {
  const runs = await (await fetch("/api/runs")).json();
  $("#runs").innerHTML = runs.length ? runs.map((r) =>
    `<div class="runrow">
      <span><a href="#" onclick="openRun('${r.runId}');return false">${esc(r.name)}</a>
        <span style="color:var(--muted)"> ${esc(r.testUrl || "")}</span></span>
      <span><span class="pill ${r.result}">${r.result}</span>
        <span style="color:var(--muted);margin-left:8px">${new Date(r.finishedAt).toLocaleString()}</span></span>
    </div>`).join("") : '<span style="color:var(--muted);font-size:13px">尚無紀錄</span>';
}
async function openRun(id) {
  const r = await (await fetch("/api/runs/" + encodeURIComponent(id))).json();
  renderReport(r);
  $("#reportBox").scrollIntoView({ behavior: "smooth" });
}

function renderReport(r) {
  const s = r.summary || {};
  let diffs = "";
  if (r.providerDiff && (r.providerDiff.onlyInMain.length || r.providerDiff.onlyInTest.length)) {
    const rows = [
      ...r.providerDiff.onlyInMain.map((p) => `<div class="row"><span class="tag miss">測試網缺</span>${esc(p.providerName)} <span style="color:var(--muted)">(${esc(p.lobbyKey)})</span></div>`),
      ...r.providerDiff.onlyInTest.map((p) => `<div class="row"><span class="tag extra">測試網多</span>${esc(p.providerName)} <span style="color:var(--muted)">(${esc(p.lobbyKey)})</span></div>`),
    ].join("");
    diffs += `<div class="diff"><h4>Provider 差異</h4>${rows}</div>`;
  }
  if ((r.providerIconDiffs || []).length) {
    const rows = r.providerIconDiffs.map((p) =>
      `<div class="row"><span class="tag icon">icon 不同</span>${esc(p.providerName)} <span style="color:var(--muted)">(${esc(p.lobbyKey)})</span>
        <div class="iconpath">主：${esc(p.mainIcon)}<br>測：${esc(p.testIcon)}</div></div>`
    ).join("");
    diffs += `<div class="diff"><h4>Provider icon 差異</h4>${rows}</div>`;
  }
  for (const d of (r.lobbyDiffs || [])) {
    const rows = [
      ...d.missing.map((g) => `<div class="row"><span class="tag miss">缺</span>${esc(g.gameName)} <span style="color:var(--muted)">(${esc(g.gameCode)})</span></div>`),
      ...d.extra.map((g) => `<div class="row"><span class="tag extra">多</span>${esc(g.gameName)} <span style="color:var(--muted)">(${esc(g.gameCode)})</span></div>`),
      ...(d.iconChanged || []).map((g) => `<div class="row"><span class="tag icon">icon 不同</span>${esc(g.gameName)} <span style="color:var(--muted)">(${esc(g.gameCode)})</span>
        <div class="iconpath">主：${esc(g.mainIcon)}<br>測：${esc(g.testIcon)}</div></div>`),
    ].join("");
    diffs += `<div class="diff"><h4>${esc(d.providerName)} — 主網 ${d.mainCount} / 測試網 ${d.testCount}</h4>${rows}</div>`;
  }
  // 流程型測試（註冊/登入/登出）：顯示每一步
  if (r.steps && r.steps.length) {
    const tagClass = (s) => (s === "PASS" ? "ok" : s === "WARN" ? "icon" : "miss");
    const rows = r.steps.map((st) =>
      `<div class="row"><span class="tag ${tagClass(st.status)}">${st.status}</span>${esc(st.name)} <span style="color:var(--muted)">— ${esc(st.detail)}</span></div>`
    ).join("");
    diffs = `<div class="diff"><h4>測試步驟</h4>${rows}</div>` + diffs;
  } else if (r.result === "PASS") {
    diffs = '<div style="color:var(--ok);font-size:14px;margin-top:12px">✓ 測試網與主網完全一致</div>';
  }

  // 依報告實際有的欄位決定要顯示哪些統計（兩種測試欄位不同）
  const stats = [];
  if (s.mainProviders != null) stats.push(`Provider 主網 ${s.mainProviders} / 測試網 ${s.testProviders}`);
  if (s.providerMissing != null || s.providerExtra != null) stats.push(`Provider 差異 ${(s.providerMissing||0)+(s.providerExtra||0)}`);
  if (s.lobbiesWithGameDiff != null) stats.push(`Game 有差異的 Provider ${s.lobbiesWithGameDiff}`);
  if (s.providerIconDiff != null) stats.push(`Provider icon 差異 ${s.providerIconDiff}`);
  if (s.gameIconDiff != null) stats.push(`Game icon 差異 ${s.gameIconDiff}`);
  const statsHtml = stats.map((t) => `<span class="stat">${t}</span>`).join("");

  // meta 區依測試型態調整：比對型顯示主/測網；流程型顯示目標站 + 建立的帳號
  let metaHtml;
  if (r.steps) {
    metaHtml = `目標站 ${esc(r.siteUrl)} → ${esc(r.walletHost)}`;
    if (r.account) metaHtml += `<br>建立帳號 ${esc(r.account.username)} / ${esc(r.account.password)}`;
  } else {
    metaHtml = `主網 ${esc(r.mainUrl)} → ${esc(r.walletHosts && r.walletHosts.main)}<br>測試網 ${esc(r.testUrl)} → ${esc(r.walletHosts && r.walletHosts.test)}`;
  }

  window.__report = r;
  $("#reportBox").innerHTML = `<div class="card">
    <div class="verdict ${r.result}">${r.result}</div>
    <div class="meta">${esc(r.name)} · ${(r.durationMs/1000).toFixed(1)}s · ${new Date(r.finishedAt).toLocaleString()}</div>
    <div class="meta">${metaHtml}</div>
    <div>${statsHtml}</div>
    <div class="dlbar">
      <button class="dl" onclick="downloadReport('md')">下載報告 (.md)</button>
      <button class="dl" onclick="downloadReport('json')">下載 JSON</button>
      <button class="dl" onclick="copyReport()">複製報告文字</button>
    </div>
    ${diffs}
  </div>`;
}

// 把報告物件轉成 Markdown，方便貼給工程師
function buildMarkdown(r) {
  const s = r.summary || {};
  const L = [];
  L.push(`# ${r.name} 報告 — ${r.result}`);
  L.push("");
  L.push(`- 測試項目：${r.name}`);
  if (r.steps) {
    L.push(`- 目標站：${r.siteUrl}  →  ${r.walletHost}`);
    if (r.account) L.push(`- 建立帳號：${r.account.username} / ${r.account.password}`);
  } else {
    L.push(`- 主網：${r.mainUrl}  →  ${r.walletHosts && r.walletHosts.main}`);
    L.push(`- 測試網：${r.testUrl}  →  ${r.walletHosts && r.walletHosts.test}`);
  }
  L.push(`- 時間：${new Date(r.finishedAt).toLocaleString()}（耗時 ${(r.durationMs/1000).toFixed(1)}s）`);
  L.push("");
  L.push(`## 結果：${r.result}`);
  if (r.steps) {
    r.steps.forEach((st) => L.push(`- ${st.status === "PASS" ? "✅" : st.status === "WARN" ? "⚠️" : "❌"} ${st.name}：${st.detail}`));
    return L.join("\n");
  }
  if (s.mainProviders != null) L.push(`- Provider 數量：主網 ${s.mainProviders} / 測試網 ${s.testProviders}`);
  if (s.providerMissing != null || s.providerExtra != null) L.push(`- Provider 差異：${(s.providerMissing||0)+(s.providerExtra||0)}`);
  if (s.lobbiesWithGameDiff != null) L.push(`- Game 有差異的 Provider：${s.lobbiesWithGameDiff}`);
  if (s.providerIconDiff != null) L.push(`- Provider icon 差異：${s.providerIconDiff}`);
  if (s.gameIconDiff != null) L.push(`- Game icon 差異：${s.gameIconDiff}`);
  L.push("");
  if (r.result === "PASS") {
    L.push("✅ 測試網與主網完全一致，無差異。");
    return L.join("\n");
  }
  const pd = r.providerDiff || { onlyInMain: [], onlyInTest: [] };
  if (pd.onlyInMain.length || pd.onlyInTest.length) {
    L.push("## Provider 差異");
    pd.onlyInMain.forEach((p) => L.push(`- ❌ 測試網缺：${p.providerName} (${p.lobbyKey})`));
    pd.onlyInTest.forEach((p) => L.push(`- ➕ 測試網多：${p.providerName} (${p.lobbyKey})`));
    L.push("");
  }
  if ((r.providerIconDiffs || []).length) {
    L.push("## Provider icon 差異");
    r.providerIconDiffs.forEach((p) => {
      L.push(`- ⚠️ ${p.providerName} (${p.lobbyKey})`);
      L.push(`  - 主：${p.mainIcon}`);
      L.push(`  - 測：${p.testIcon}`);
    });
    L.push("");
  }
  if ((r.lobbyDiffs || []).length) {
    L.push("## Game 差異");
    for (const d of r.lobbyDiffs) {
      L.push(`### ${d.providerName} （${d.lobbyKey}） — 主網 ${d.mainCount} / 測試網 ${d.testCount}`);
      d.missing.forEach((g) => L.push(`- ❌ 缺：${g.gameName} (${g.gameCode})`));
      d.extra.forEach((g) => L.push(`- ➕ 多：${g.gameName} (${g.gameCode})`));
      (d.iconChanged || []).forEach((g) => {
        L.push(`- ⚠️ icon 不同：${g.gameName} (${g.gameCode})`);
        L.push(`  - 主：${g.mainIcon}`);
        L.push(`  - 測：${g.testIcon}`);
      });
      L.push("");
    }
  }
  return L.join("\n");
}

function fileStamp(r) {
  const host = (r.testUrl || "").replace(/^https?:\/\//, "").replace(/[^a-zA-Z0-9.-]/g, "_");
  const ts = (r.finishedAt || "").replace(/[:.]/g, "-").slice(0, 19);
  return `${r.testId || "report"}_${host}_${ts}`;
}

function saveBlob(content, filename, type) {
  const blob = new Blob([content], { type });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function downloadReport(fmt) {
  const r = window.__report;
  if (!r) return;
  if (fmt === "json") {
    saveBlob(JSON.stringify(r, null, 2), fileStamp(r) + ".json", "application/json");
  } else {
    saveBlob(buildMarkdown(r), fileStamp(r) + ".md", "text/markdown");
  }
}

function copyReport() {
  const r = window.__report;
  if (!r) return;
  navigator.clipboard.writeText(buildMarkdown(r)).then(
    () => alert("報告文字已複製，可直接貼給工程師"),
    () => alert("複製失敗，請改用下載")
  );
}

async function generatePrompt(t, params) {
  $("#go").disabled = true;
  $("#reportBox").innerHTML = "";
  try {
    const r = await (await fetch("/api/prompt?" + params.toString())).json();
    const text = r.prompt || "（產生失敗）";
    window.__lastPrompt = text;
    $("#reportBox").innerHTML = `<div class="card">
      <div style="font-size:15px;font-weight:600;margin-bottom:6px">📋 複製這段指令，貼到你自己的 Claude 對話（要有 Claude in Chrome）</div>
      <div class="meta">Claude 會開瀏覽器實際測這個站，報告會出現在那邊的對話裡。</div>
      <div class="dlbar"><button class="dl" onclick="copyPrompt()">複製指令</button></div>
      <textarea id="promptBox" readonly style="width:100%;height:320px;margin-top:8px;background:#0f1115;color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:12px;font-size:13px;line-height:1.5;box-sizing:border-box">${esc(text)}</textarea>
    </div>`;
  } catch (e) {
    $("#reportBox").innerHTML = `<div class="card err">✗ 產生指令失敗：${esc(String(e.message || e))}</div>`;
  }
  $("#go").disabled = false;
}
function copyPrompt() {
  navigator.clipboard.writeText(window.__lastPrompt || "").then(
    () => alert("指令已複製，貼到你的 Claude 對話即可"),
    () => { const b = $("#promptBox"); if (b) { b.select(); document.execCommand("copy"); alert("已複製"); } }
  );
}

$("#go").onclick = () => {
  const t = curTest();
  const params = new URLSearchParams({ testId: t.id });
  for (const i of t.inputs) {
    const v = $("#in_" + i.key).value.trim();
    if (!v) { if (i.optional) continue; alert("請填寫 " + i.label); return; }
    params.set(i.key, v);
  }
  // B 類：產生指令給使用者複製，不執行
  if (t.mode === "prompt") { generatePrompt(t, params); return; }
  $("#go").disabled = true;
  $("#reportBox").innerHTML = "";
  $("#progress").style.display = "block";
  $("#pmsg").textContent = "連線中…";
  $("#barfill").style.width = "0%";
  $("#psub").textContent = "";

  const es = new EventSource("/api/run?" + params.toString());
  es.addEventListener("progress", (e) => {
    const p = JSON.parse(e.data);
    $("#pmsg").textContent = p.message;
    if (p.phase === "games" && p.total) {
      $("#barfill").classList.remove("indet");
      $("#barfill").style.width = Math.round((p.current / p.total) * 100) + "%";
      $("#psub").textContent = `${p.current} / ${p.total}`;
    } else if (p.phase === "ai") {
      // AI 執行時長度不定，用跑馬燈動畫表示「進行中」
      $("#barfill").classList.add("indet");
      $("#barfill").style.width = "100%";
    }
  });
  es.addEventListener("done", (e) => {
    es.close();
    $("#progress").style.display = "none";
    $("#go").disabled = false;
    renderReport(JSON.parse(e.data));
    loadRuns();
  });
  es.addEventListener("error", (e) => {
    es.close();
    $("#progress").style.display = "none";
    $("#go").disabled = false;
    let msg = "執行失敗";
    try { msg = JSON.parse(e.data).message; } catch {}
    $("#reportBox").innerHTML = `<div class="card err">✗ ${esc(msg)}</div>`;
  });
};

loadTests();
loadRuns();
</script>
</body>
</html>
